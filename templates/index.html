{% extends "base.html" %}

{% block title %}Research Constructicon{% endblock %}

{% block content %}

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: white;
    }

    html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    flex-direction: column;


    .page-content {
    flex: 1;
}

    /* Top navigation bar */
    .topbar {
        background-color: #f2a900; /* FAU yellow */
        padding: 15px 40px;
        display: flex;
        gap: 40px;
        font-weight: bold;
    }

    .topbar a {
        text-decoration: none;
        color: black;
        font-size: 16px;
    }

    .topbar a:hover {
        text-decoration: underline;
    }

    /* Title section */
    .title-section {
        padding: 60px 40px 20px 40px;
    }

    .main-title {
        color: #003366; /* deep blue */
        font-size: 48px;
        font-weight: 700;
        margin: 0;
    }

    /* Intro text */
    .intro {
        padding: 20px 40px;
        max-width: 800px;
        font-size: 18px;
        line-height: 1.6;
    }

    /* CTA section */
    .cta {
        padding: 60px 40px;
        text-align: center;
    }

    .cta-button {
    background-color: #003366;
    color: white;
    padding: 35px 80px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    display: inline-block;
    text-align: center;
}

.cta-button .line1 {
    display: block;
    font-size: 26px;
}

.cta-button .line2 {
    display: block;
    font-size: 40px;
    margin-top: 5px;
}

.cta-button:hover {
    background-color: #00509e;
}

    /* Footer */
    .footer {
        background-color: #003366;
        color: white;
        padding: 40px;
        display: flex;
        gap: 40px;
    }

    .footer a {
        color: white;
        text-decoration: none;
        font-size: 16px;
    }

    .footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="page-content">

<!-- Top bar -->
<div class="topbar">
    <a href="{{ url_for('app_form.online_form') }}">Submit a construction</a>
    <a href="{{ url_for('app_compcon.list_view') }}">Comparative concepts</a>
    <a href="https://www.cxg.phil.fau.eu/">Dimensions of Constructional Space</a>
</div>


<!-- Title -->
<div class="title-section">
    <h1 class="main-title">Research Constructicon</h1>
</div>


<!-- Intro text -->
<div class="intro">
    <p>
        Bla bla bla
    </p>
    <p>
        Bla bla bla
    </p>
</div>


<!-- CTA -->
<div class="cta">
    <button class="cta-button"
            onclick="window.location.href='{{ url_for('app_entries.list_view') }}'">
        <span class="line1">Enter the</span>
        <span class="line2">Research Constructicon</span>
    </button>
</div>

    </div>

<!-- Footer -->
<div class="footer">
    <!-- <a href="#">The project</a>
    <a href="#">The Team</a>
    <a href="#">Impressum</a> -->
</div>

{% endblock %}
